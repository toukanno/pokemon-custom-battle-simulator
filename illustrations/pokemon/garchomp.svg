  <path d="M270 200 Q305 195 340 180 Q350 175 352 185 Q348 195 335 198 Q355 200 365 210 Q355 215 335 210 Q345 218 350 228 Q338 225 320 215 Q300 205 270 210Z" fill="url(#garchomp-fin)" stroke="#1A2A44" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="200" cy="250" rx="55" ry="75" fill="url(#garchomp-body)" stroke="#233554" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="200" cy="262" rx="32" ry="48" fill="url(#garchomp-belly)"/>
  <!-- Chest red diamond -->
  <path d="M200 210 L210 225 L200 240 L190 225Z" fill="url(#garchomp-red)" stroke="#801010" stroke-width="1"/>
  <!-- Legs -->
  <path d="M168 310 Q160 335 152 350 Q148 358 158 358 Q165 355 168 348 Q172 356 180 358 Q184 352 172 342 Q175 330 178 315Z" fill="url(#garchomp-body)" stroke="#233554" stroke-width="1.5"/>
  <path d="M232 310 Q240 335 248 350 Q252 358 242 358 Q235 355 232 348 Q228 356 220 358 Q216 352 228 342 Q225 330 222 315Z" fill="url(#garchomp-body)" stroke="#233554" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M175 190 Q190 170 200 165 Q210 170 225 190" fill="url(#garchomp-body)" stroke="#233554" stroke-width="1.5"/>
  <!-- Head -->
  <path d="M160 150 Q170 115 200 105 Q230 115 240 150 Q235 170 200 175 Q165 170 160 150Z" fill="url(#garchomp-body)" stroke="#233554" stroke-width="2"/>
  <!-- Head crest/horn -->
  <path d="M190 110 Q185 85 175 60 Q188 80 195 105Z" fill="url(#garchomp-fin)" stroke="#1A2A44" stroke-width="1.5"/>
  <path d="M210 110 Q215 85 225 60 Q212 80 205 105Z" fill="url(#garchomp-fin)" stroke="#1A2A44" stroke-width="1.5"/>
  <!-- Side horns -->
  <path d="M162 140 Q145 132 130 125 Q140 138 155 145Z" fill="url(#garchomp-fin)"/>
  <path d="M238 140 Q255 132 270 125 Q260 138 245 145Z" fill="url(#garchomp-fin)"/>
