<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="garchomp-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A6FA5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A6FA5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="garchomp-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A6FA5"/>
      <stop offset="100%" stop-color="#344E78"/>
    </linearGradient>
    <linearGradient id="garchomp-belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4A870"/>
      <stop offset="100%" stop-color="#A88D55"/>
    </linearGradient>
    <linearGradient id="garchomp-fin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#344E78"/>
      <stop offset="100%" stop-color="#233554"/>
    </linearGradient>
    <linearGradient id="garchomp-red" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#CC3333"/>
      <stop offset="100%" stop-color="#991A1A"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#garchomp-bg)"/>
  <!-- Tail -->
  <path d="M220 310 Q250 340 280 350 Q300 355 310 345 Q300 340 285 332 Q260 320 240 305Z" fill="url(#garchomp-body)" stroke="#233554" stroke-width="2"/>
  <!-- Tail fin -->
