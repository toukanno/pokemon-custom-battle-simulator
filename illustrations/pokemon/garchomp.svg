  <!-- Left arm/fin blade -->
  <path d="M130 200 Q95 195 60 180 Q50 175 48 185 Q52 195 65 198 Q45 200 35 210 Q45 215 65 210 Q55 218 50 228 Q62 225 80 215 Q100 205 130 210Z" fill="url(#garchomp-fin)" stroke="#1A2A44" stroke-width="1.5"/>
