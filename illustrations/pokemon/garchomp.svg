  <ellipse cx="180" cy="140" rx="12" ry="10" fill="#FFD700"/>
  <ellipse cx="220" cy="140" rx="12" ry="10" fill="#FFD700"/>
  <ellipse cx="183" cy="141" rx="5" ry="8" fill="#111"/>
  <ellipse cx="223" cy="141" rx="5" ry="8" fill="#111"/>
  <circle cx="181" cy="137" r="2" fill="#FFF8DC"/>
  <circle cx="221" cy="137" r="2" fill="#FFF8DC"/>
  <!-- Star marking under eyes -->
  <path d="M170 148 Q175 155 168 158" fill="none" stroke="url(#garchomp-red)" stroke-width="2"/>
  <path d="M230 148 Q225 155 232 158" fill="none" stroke="url(#garchomp-red)" stroke-width="2"/>
  <!-- Mouth -->
  <path d="M175 160 Q200 170 225 160" fill="none" stroke="#233554" stroke-width="2"/>
  <!-- Name label -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4A6FA5">GARCHOMP</text>
  <text x="200" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A6FA5">Dragon / Ground</text>
</svg>