<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="dragonite-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F0A030" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dragonite-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0A030"/>
      <stop offset="100%" stop-color="#D08A20"/>
    </linearGradient>
    <linearGradient id="dragonite-belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF3C4"/>
      <stop offset="100%" stop-color="#F0D890"/>
    </linearGradient>
    <linearGradient id="dragonite-wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78C878"/>
      <stop offset="100%" stop-color="#58A858"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#dragonite-bg)"/>
  <!-- Left wing -->
  <path d="M130 150 Q90 100 60 70 Q85 80 100 95 Q80 60 65 35 Q95 60 110 85 Q100 50 95 25 Q115 55 120 85 Q120 55 125 35 Q130 65 128 95 Q135 120 130 150Z" fill="url(#dragonite-wing)" stroke="#3D8B3D" stroke-width="1.5"/>
  <!-- Right wing -->
  <path d="M270 150 Q310 100 340 70 Q315 80 300 95 Q320 60 335 35 Q305 60 290 85 Q300 50 305 25 Q285 55 280 85 Q280 55 275 35 Q270 65 272 95 Q265 120 270 150Z" fill="url(#dragonite-wing)" stroke="#3D8B3D" stroke-width="1.5"/>
  <!-- Tail -->
  <path d="M180 320 Q160 340 140 350 Q125 355 130 348 Q140 340 155 330 Q165 322 178 318Z" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Body -->
  <ellipse cx="200" cy="260" rx="65" ry="75" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="200" cy="270" rx="42" ry="50" fill="url(#dragonite-belly)"/>
  <!-- Belly stripes -->
  <path d="M170 245 Q200 240 230 245" fill="none" stroke="#D4B870" stroke-width="1"/>
  <path d="M165 260 Q200 255 235 260" fill="none" stroke="#D4B870" stroke-width="1"/>
  <path d="M165 275 Q200 270 235 275" fill="none" stroke="#D4B870" stroke-width="1"/>
  <path d="M168 290 Q200 285 232 290" fill="none" stroke="#D4B870" stroke-width="1"/>
  <!-- Left arm -->
  <path d="M140 230 Q115 240 105 250 Q100 260 110 258 Q120 252 128 245 Q135 240 142 235Z" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Right arm -->
  <path d="M260 230 Q285 240 295 250 Q300 260 290 258 Q280 252 272 245 Q265 240 258 235Z" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Left foot -->
  <ellipse cx="170" cy="332" rx="22" ry="10" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Right foot -->
  <ellipse cx="230" cy="332" rx="22" ry="10" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M175 200 Q190 180 200 175 Q210 180 225 200" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="200" cy="155" rx="42" ry="38" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="2"/>
  <!-- Antennae -->
  <path d="M180 125 Q175 100 170 85 Q168 78 175 82 Q178 90 182 120Z" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <circle cx="170" cy="82" r="5" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1"/>
  <path d="M220 125 Q225 100 230 85 Q232 78 225 82 Q222 90 218 120Z" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1.5"/>
  <circle cx="230" cy="82" r="5" fill="url(#dragonite-body)" stroke="#B07818" stroke-width="1"/>
  <!-- Snout -->
  <ellipse cx="200" cy="168" rx="22" ry="14" fill="#D8922A"/>
  <!-- Eyes (big, friendly) -->
  <ellipse cx="182" cy="148" rx="12" ry="14" fill="white"/>
  <ellipse cx="218" cy="148" rx="12" ry="14" fill="white"/>
  <ellipse cx="185" cy="150" rx="7" ry="9" fill="#333"/>
  <ellipse cx="221" cy="150" rx="7" ry="9" fill="#333"/>
  <ellipse cx="188" cy="146" rx="3.5" ry="4" fill="white"/>
  <ellipse cx="224" cy="146" rx="3.5" ry="4" fill="white"/>
  <!-- Happy mouth -->
  <path d="M188 174 Q200 182 212 174" fill="none" stroke="#B07818" stroke-width="2" stroke-linecap="round"/>
  <!-- Nostrils -->
  <circle cx="194" cy="165" r="2" fill="#B07818"/>
  <circle cx="206" cy="165" r="2" fill="#B07818"/>
  <!-- Name label -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#D08A20">DRAGONITE</text>
  <text x="200" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F0A030">Dragon / Flying</text>
</svg>