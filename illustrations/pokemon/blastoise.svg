<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="blastoise-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4A90D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blastoise-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="100%" stop-color="#3A7ABD"/>
    </linearGradient>
    <linearGradient id="blastoise-shell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F10"/>
    </linearGradient>
    <linearGradient id="blastoise-belly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#D4C4A0"/>
    </linearGradient>
    <linearGradient id="cannon-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <filter id="water-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#blastoise-bg)"/>
  <!-- Water spray left -->
  <g filter="url(#water-glow)" opacity="0.6">
    <path d="M85 85 Q80 75 75 60 Q73 50 78 55 Q82 48 80 40" fill="none" stroke="#87CEEB" stroke-width="3" stroke-linecap="round"/>
    <path d="M90 85 Q92 72 88 58 Q87 48 92 50" fill="none" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Water spray right -->
  <g filter="url(#water-glow)" opacity="0.6">
    <path d="M315 85 Q320 75 325 60 Q327 50 322 55 Q318 48 320 40" fill="none" stroke="#87CEEB" stroke-width="3" stroke-linecap="round"/>
    <path d="M310 85 Q308 72 312 58 Q313 48 308 50" fill="none" stroke="#87CEEB" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Shell back -->
  <ellipse cx="200" cy="240" rx="85" ry="90" fill="url(#blastoise-shell)" stroke="#5A3E0A" stroke-width="2.5"/>
  <!-- Shell pattern -->
  <path d="M145 190 Q200 170 255 190" fill="none" stroke="#5A3E0A" stroke-width="2"/>
  <path d="M130 230 Q200 210 270 230" fill="none" stroke="#5A3E0A" stroke-width="2"/>
  <path d="M135 270 Q200 250 265 270" fill="none" stroke="#5A3E0A" stroke-width="2"/>
  <line x1="200" y1="160" x2="200" y2="310" stroke="#5A3E0A" stroke-width="2"/>
  <!-- Left cannon -->
  <rect x="75" y="85" rx="8" ry="8" width="30" height="65" fill="url(#cannon-metal)" stroke="#555" stroke-width="2"/>
  <ellipse cx="90" cy="85" rx="15" ry="8" fill="#888" stroke="#555" stroke-width="1.5"/>
  <circle cx="90" cy="85" r="8" fill="#333"/>
  <!-- Right cannon -->
  <rect x="295" y="85" rx="8" ry="8" width="30" height="65" fill="url(#cannon-metal)" stroke="#555" stroke-width="2"/>
  <ellipse cx="310" cy="85" rx="15" ry="8" fill="#888" stroke="#555" stroke-width="1.5"/>
  <circle cx="310" cy="85" r="8" fill="#333"/>
  <!-- Body front -->
  <ellipse cx="200" cy="250" rx="60" ry="70" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="200" cy="265" rx="38" ry="45" fill="url(#blastoise-belly)"/>
  <!-- Left arm -->
  <path d="M145 230 Q120 240 105 260 Q100 270 108 272 Q115 268 118 262 Q125 250 145 245Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="2"/>
  <!-- Claws left -->
  <path d="M105 270 L98 280 M108 272 L102 283 M112 273 L108 283" stroke="#2E6A9E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M255 230 Q280 240 295 260 Q300 270 292 272 Q285 268 282 262 Q275 250 255 245Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="2"/>
  <!-- Claws right -->
  <path d="M295 270 L302 280 M292 272 L298 283 M288 273 L292 283" stroke="#2E6A9E" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left leg -->
  <path d="M165 310 Q158 335 150 350 Q145 358 155 360 Q162 358 165 352 Q170 358 178 360 Q182 356 172 348 Q175 335 178 315Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="1.5"/>
  <!-- Right leg -->
  <path d="M235 310 Q242 335 250 350 Q255 358 245 360 Q238 358 235 352 Q230 358 222 360 Q218 356 228 348 Q225 335 222 315Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="1.5"/>
  <!-- Neck -->
  <path d="M175 195 Q190 175 200 170 Q210 175 225 195" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="200" cy="155" rx="38" ry="32" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="2"/>
  <!-- Ears/ridges -->
  <path d="M165 140 Q155 128 162 120 Q168 128 170 140Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="1.5"/>
  <path d="M235 140 Q245 128 238 120 Q232 128 230 140Z" fill="url(#blastoise-body)" stroke="#2E6A9E" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="185" cy="148" rx="9" ry="10" fill="white"/>
  <ellipse cx="215" cy="148" rx="9" ry="10" fill="white"/>
  <ellipse cx="188" cy="149" rx="5" ry="7" fill="#8B0000"/>
  <ellipse cx="218" cy="149" rx="5" ry="7" fill="#8B0000"/>
  <circle cx="190" cy="146" r="2" fill="white"/>
  <circle cx="220" cy="146" r="2" fill="white"/>
  <!-- Jaw -->
  <path d="M175 165 Q200 178 225 165" fill="none" stroke="#2E6A9E" stroke-width="2"/>
  <!-- Mouth -->
  <path d="M190 170 Q200 174 210 170" fill="none" stroke="#2E6A9E" stroke-width="1.5"/>
  <!-- Name label -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3A7ABD">BLASTOISE</text>
  <text x="200" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A90D9">Water</text>
</svg>