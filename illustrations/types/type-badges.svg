<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="badge-shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <style>
    .badge-text { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: white; text-anchor: middle; dominant-baseline: central; }
    .title-text { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; text-anchor: middle; }
  </style>
  <!-- Title -->
  <text x="400" y="35" class="title-text">Pokemon Type Badges</text>
  <!-- Row 1 -->
  <g filter="url(#badge-shadow)">
    <!-- Normal -->
    <rect x="30" y="60" rx="15" ry="15" width="120" height="36" fill="#A8A878"/>
    <text x="90" y="78" class="badge-text">NORMAL</text>
    <!-- Fire -->
    <rect x="170" y="60" rx="15" ry="15" width="120" height="36" fill="#F08030"/>
    <text x="230" y="78" class="badge-text">FIRE</text>
    <!-- Water -->
    <rect x="310" y="60" rx="15" ry="15" width="120" height="36" fill="#6890F0"/>
    <text x="370" y="78" class="badge-text">WATER</text>
    <!-- Electric -->
    <rect x="450" y="60" rx="15" ry="15" width="120" height="36" fill="#F8D030"/>
    <text x="510" y="78" class="badge-text" fill="#333">ELECTRIC</text>
    <!-- Grass -->
    <rect x="590" y="60" rx="15" ry="15" width="120" height="36" fill="#78C850"/>
    <text x="650" y="78" class="badge-text">GRASS</text>
  </g>
  <!-- Row 2 -->
  <g filter="url(#badge-shadow)">
    <!-- Ice -->
    <rect x="30" y="115" rx="15" ry="15" width="120" height="36" fill="#98D8D8"/>
    <text x="90" y="133" class="badge-text" fill="#333">ICE</text>
    <!-- Fighting -->
    <rect x="170" y="115" rx="15" ry="15" width="120" height="36" fill="#C03028"/>
    <text x="230" y="133" class="badge-text">FIGHTING</text>
    <!-- Poison -->
    <rect x="310" y="115" rx="15" ry="15" width="120" height="36" fill="#A040A0"/>
    <text x="370" y="133" class="badge-text">POISON</text>
    <!-- Ground -->
    <rect x="450" y="115" rx="15" ry="15" width="120" height="36" fill="#E0C068"/>
    <text x="510" y="133" class="badge-text" fill="#333">GROUND</text>
    <!-- Flying -->
    <rect x="590" y="115" rx="15" ry="15" width="120" height="36" fill="#A890F0"/>
    <text x="650" y="133" class="badge-text">FLYING</text>
  </g>
  <!-- Row 3 -->
  <g filter="url(#badge-shadow)">
    <!-- Psychic -->
    <rect x="30" y="170" rx="15" ry="15" width="120" height="36" fill="#F85888"/>
    <text x="90" y="188" class="badge-text">PSYCHIC</text>
    <!-- Bug -->
    <rect x="170" y="170" rx="15" ry="15" width="120" height="36" fill="#A8B820"/>
    <text x="230" y="188" class="badge-text">BUG</text>
    <!-- Rock -->
    <rect x="310" y="170" rx="15" ry="15" width="120" height="36" fill="#B8A038"/>
    <text x="370" y="188" class="badge-text">ROCK</text>
    <!-- Ghost -->
    <rect x="450" y="170" rx="15" ry="15" width="120" height="36" fill="#705898"/>
    <text x="510" y="188" class="badge-text">GHOST</text>
    <!-- Dragon -->
    <rect x="590" y="170" rx="15" ry="15" width="120" height="36" fill="#7038F8"/>
    <text x="650" y="188" class="badge-text">DRAGON</text>
  </g>
  <!-- Row 4 -->
  <g filter="url(#badge-shadow)">
    <!-- Dark -->
    <rect x="110" y="225" rx="15" ry="15" width="120" height="36" fill="#705848"/>
    <text x="170" y="243" class="badge-text">DARK</text>
    <!-- Steel -->
    <rect x="250" y="225" rx="15" ry="15" width="120" height="36" fill="#B8B8D0"/>
    <text x="310" y="243" class="badge-text" fill="#333">STEEL</text>
    <!-- Fairy -->
    <rect x="390" y="225" rx="15" ry="15" width="120" height="36" fill="#EE99AC"/>
    <text x="450" y="243" class="badge-text">FAIRY</text>
  </g>
  <!-- Type effectiveness chart (simplified) -->
  <text x="400" y="300" class="title-text" font-size="18">Type Effectiveness Key</text>
  <!-- Super effective -->
  <rect x="80" y="320" rx="8" ry="8" width="160" height="30" fill="#4CAF50" opacity="0.8"/>
  <text x="160" y="335" class="badge-text" font-size="12">2x SUPER EFFECTIVE</text>
  <!-- Not very effective -->
  <rect x="260" y="320" rx="8" ry="8" width="180" height="30" fill="#FF9800" opacity="0.8"/>
  <text x="350" y="335" class="badge-text" font-size="12">0.5x NOT VERY EFFECTIVE</text>
  <!-- No effect -->
  <rect x="460" y="320" rx="8" ry="8" width="150" height="30" fill="#757575" opacity="0.8"/>
  <text x="535" y="335" class="badge-text" font-size="12">0x NO EFFECT</text>
  <!-- Example matchups -->
  <g transform="translate(0, 370)">
    <text x="400" y="15" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#555" text-anchor="middle">Example Matchups</text>
    <!-- Fire > Grass -->
    <rect x="50" y="30" rx="10" ry="10" width="80" height="26" fill="#F08030"/>
    <text x="90" y="43" class="badge-text" font-size="11">FIRE</text>
    <text x="145" y="43" font-family="Arial, sans-serif" font-size="16" fill="#4CAF50" font-weight="bold" text-anchor="middle">→ 2x →</text>
    <rect x="165" y="30" rx="10" ry="10" width="80" height="26" fill="#78C850"/>
    <text x="205" y="43" class="badge-text" font-size="11">GRASS</text>
    <!-- Water > Fire -->
    <rect x="280" y="30" rx="10" ry="10" width="80" height="26" fill="#6890F0"/>
    <text x="320" y="43" class="badge-text" font-size="11">WATER</text>
    <text x="375" y="43" font-family="Arial, sans-serif" font-size="16" fill="#4CAF50" font-weight="bold" text-anchor="middle">→ 2x →</text>
    <rect x="395" y="30" rx="10" ry="10" width="80" height="26" fill="#F08030"/>
    <text x="435" y="43" class="badge-text" font-size="11">FIRE</text>
    <!-- Ghost x Normal -->
    <rect x="510" y="30" rx="10" ry="10" width="80" height="26" fill="#705898"/>
    <text x="550" y="43" class="badge-text" font-size="11">GHOST</text>
    <text x="605" y="43" font-family="Arial, sans-serif" font-size="16" fill="#757575" font-weight="bold" text-anchor="middle">→ 0x →</text>
    <rect x="625" y="30" rx="10" ry="10" width="80" height="26" fill="#A8A878"/>
    <text x="665" y="43" class="badge-text" font-size="11">NORMAL</text>
  </g>
</svg>