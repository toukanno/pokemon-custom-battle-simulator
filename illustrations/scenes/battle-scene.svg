<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#E0F0FF"/>
      <stop offset="100%" stop-color="#C8E8C8"/>
    </linearGradient>
    <linearGradient id="ground-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FBC8F"/>
      <stop offset="100%" stop-color="#6B8E6B"/>
    </linearGradient>
    <linearGradient id="arena-floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D2B48C"/>
      <stop offset="100%" stop-color="#A0845C"/>
    </linearGradient>
    <linearGradient id="fire-attack" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF4500"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="scene-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="impact-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Charizard body gradient -->
    <linearGradient id="char-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8730C"/>
      <stop offset="100%" stop-color="#C45A08"/>
    </linearGradient>
    <!-- Blastoise body gradient -->
    <linearGradient id="blast-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B9BD5"/>
      <stop offset="100%" stop-color="#3A7ABD"/>
    </linearGradient>
    <linearGradient id="hp-bar-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="hp-bar-yellow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky-gradient)"/>
  <!-- Clouds -->
  <g opacity="0.6">
    <ellipse cx="150" cy="60" rx="80" ry="25" fill="white"/>
    <ellipse cx="190" cy="55" rx="60" ry="20" fill="white"/>
    <ellipse cx="120" cy="55" rx="50" ry="18" fill="white"/>
    <ellipse cx="600" cy="80" rx="70" ry="22" fill="white"/>
    <ellipse cx="640" cy="75" rx="50" ry="18" fill="white"/>
    <ellipse cx="400" cy="40" rx="60" ry="18" fill="white"/>
  </g>
  <!-- Ground -->
  <ellipse cx="400" cy="420" rx="380" ry="100" fill="url(#ground-gradient)"/>
  <!-- Arena floor -->
  <ellipse cx="400" cy="400" rx="300" ry="70" fill="url(#arena-floor)" stroke="#8B7355" stroke-width="2"/>
  <!-- Arena lines -->
  <ellipse cx="400" cy="400" rx="280" ry="60" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="335" x2="400" y2="465" stroke="white" stroke-width="2" opacity="0.3"/>
  <!-- Left platform (Player side) -->
  <ellipse cx="200" cy="380" rx="90" ry="25" fill="#A0845C" stroke="#8B7355" stroke-width="2"/>
  <ellipse cx="200" cy="375" rx="90" ry="25" fill="#C4A87C" stroke="#A0845C" stroke-width="1.5"/>
  <!-- Right platform (Opponent side) -->
  <ellipse cx="580" cy="320" rx="80" ry="20" fill="#A0845C" stroke="#8B7355" stroke-width="2"/>
  <ellipse cx="580" cy="316" rx="80" ry="20" fill="#C4A87C" stroke="#A0845C" stroke-width="1.5"/>
  <!-- === CHARIZARD (Player side - left, larger) === -->
  <g transform="translate(160, 220) scale(0.7)">
    <!-- Tail flame -->
    <path d="M-20 180 Q-35 160 -38 140 Q-45 120 -35 105 Q-40 130 -30 138 Q-38 115 -25 100 Q-30 125 -22 135 Q-28 115 -18 105 Q-24 125 -18 145 Q-15 160 -18 175Z" fill="url(#fire-attack)" opacity="0.9"/>
    <!-- Wings -->
    <path d="M-10 25 Q-35 -10 -55 -30 Q-35 -28 -20 -18 Q-30 -38 -40 -55 Q-20 -40 -10 -25 Q-15 -45 -18 -60 Q-5 -38 0 -18 Q2 -35 5 -48 Q5 -28 3 -12 Q10 -25 18 -38 Q12 -18 8 -5Z" fill="#1E90AA" stroke="#166E85" stroke-width="1"/>
    <path d="M80 25 Q105 -10 125 -30 Q105 -28 90 -18 Q100 -38 110 -55 Q90 -40 80 -25 Q85 -45 88 -60 Q75 -38 70 -18 Q68 -35 65 -48 Q65 -28 67 -12 Q60 -25 52 -38 Q58 -18 62 -5Z" fill="#1E90AA" stroke="#166E85" stroke-width="1"/>
    <!-- Body -->
    <ellipse cx="35" cy="100" rx="40" ry="50" fill="url(#char-body)" stroke="#A04808" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="35" cy="108" rx="25" ry="32" fill="#F5D78E"/>
    <!-- Head -->
    <ellipse cx="35" cy="35" rx="25" ry="22" fill="url(#char-body)" stroke="#A04808" stroke-width="1.5"/>
    <!-- Horns -->
    <path d="M18 18 Q12 5 15 -5 Q18 3 22 15Z" fill="url(#char-body)"/>
    <path d="M52 18 Q58 5 55 -5 Q52 3 48 15Z" fill="url(#char-body)"/>
    <!-- Eyes -->
    <ellipse cx="25" cy="32" rx="5" ry="6" fill="white"/>
    <ellipse cx="45" cy="32" rx="5" ry="6" fill="white"/>
    <ellipse cx="27" cy="33" rx="3" ry="4" fill="#1A5276"/>
    <ellipse cx="47" cy="33" rx="3" ry="4" fill="#1A5276"/>
    <!-- Mouth open (attacking!) -->
    <path d="M25 48 Q35 42 45 48 Q38 55 32 55Z" fill="#FF4500"/>
    <path d="M28 48 L32 52 L35 48" fill="white"/>
    <path d="M38 48 L42 52 L44 48" fill="white"/>
  </g>
  <!-- Fire Blast attack effect -->
  <g filter="url(#scene-glow)">
    <path d="M320 280 Q360 260 400 270 Q380 255 410 250 Q390 240 420 235 Q400 225 435 220 Q450 215 470 225 Q460 210 480 215" fill="none" stroke="#FF4500" stroke-width="4" opacity="0.7"/>
    <path d="M340 290 Q370 275 400 280 Q390 265 415 260 Q400 250 425 245 Q415 235 440 230 Q455 225 475 232" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
    <!-- Impact sparks -->
    <circle cx="490" cy="250" r="15" fill="#FF4500" opacity="0.4" filter="url(#impact-blur)"/>
    <circle cx="485" cy="245" r="8" fill="#FFD700" opacity="0.6"/>
  </g>
  <!-- === BLASTOISE (Opponent side - right, smaller for perspective) === -->
  <g transform="translate(530, 175) scale(0.55)">
    <!-- Shell -->
    <ellipse cx="35" cy="100" rx="55" ry="60" fill="#8B6914" stroke="#5A3E0A" stroke-width="2"/>
    <path d="M-5 70 Q35 55 75 70" fill="none" stroke="#5A3E0A" stroke-width="1.5"/>
    <path d="M-12 95 Q35 80 82 95" fill="none" stroke="#5A3E0A" stroke-width="1.5"/>
    <line x1="35" y1="45" x2="35" y2="150" stroke="#5A3E0A" stroke-width="1.5"/>
    <!-- Body front -->
    <ellipse cx="35" cy="105" rx="38" ry="48" fill="url(#blast-body)" stroke="#2E6A9E" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="35" cy="112" rx="24" ry="30" fill="#F5E6C8"/>
    <!-- Head -->
    <ellipse cx="35" cy="48" rx="25" ry="20" fill="url(#blast-body)" stroke="#2E6A9E" stroke-width="1.5"/>
    <!-- Eyes (bracing for impact!) -->
    <path d="M22 44 Q27 40 34 44" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M38 44 Q43 40 48 44" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Cannons -->
    <rect x="-30" y="55" rx="5" ry="5" width="20" height="40" fill="#B0B0B0" stroke="#555" stroke-width="1.5"/>
    <rect x="80" y="55" rx="5" ry="5" width="20" height="40" fill="#B0B0B0" stroke="#555" stroke-width="1.5"/>
  </g>
  <!-- UI Elements -->
  <!-- Player info box (bottom left) -->
  <g>
    <rect x="20" y="430" rx="10" ry="10" width="260" height="60" fill="white" stroke="#DDD" stroke-width="2" opacity="0.95"/>
    <text x="35" y="452" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">CHARIZARD</text>
    <text x="230" y="452" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="end">Lv.50</text>
    <!-- HP bar background -->
    <rect x="35" y="460" rx="4" ry="4" width="200" height="10" fill="#DDD"/>
    <!-- HP bar fill -->
    <rect x="35" y="460" rx="4" ry="4" width="170" height="10" fill="url(#hp-bar-green)"/>
    <text x="240" y="469" font-family="Arial, sans-serif" font-size="10" fill="#666">HP</text>
    <text x="120" y="485" font-family="Arial, sans-serif" font-size="11" fill="#666">145 / 170</text>
  </g>
  <!-- Opponent info box (top right) -->
  <g>
    <rect x="500" y="120" rx="10" ry="10" width="260" height="55" fill="white" stroke="#DDD" stroke-width="2" opacity="0.95"/>
    <text x="515" y="142" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">BLASTOISE</text>
    <text x="710" y="142" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="end">Lv.50</text>
    <!-- HP bar background -->
    <rect x="515" y="150" rx="4" ry="4" width="200" height="10" fill="#DDD"/>
    <!-- HP bar fill (damaged) -->
    <rect x="515" y="150" rx="4" ry="4" width="100" height="10" fill="url(#hp-bar-yellow)"/>
    <text x="720" y="159" font-family="Arial, sans-serif" font-size="10" fill="#666">HP</text>
  </g>
  <!-- Battle message box -->
  <rect x="20" y="15" rx="8" ry="8" width="350" height="40" fill="rgba(0,0,0,0.7)" opacity="0.9"/>
  <text x="195" y="40" font-family="Arial, sans-serif" font-size="15" fill="white" text-anchor="middle">Charizard used Flamethrower!</text>
  <!-- Effectiveness text -->
  <text x="580" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF4500" text-anchor="middle" opacity="0.8">It's not very effective...</text>
  <!-- Title -->
  <text x="400" y="495" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Pokemon Custom Battle Simulator - Battle Scene</text>
</svg>